server:
  port: 9090

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/library_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 开发阶段自动执行 init.sql（首次启动时可改为 always）
  sql:
    init:
      mode: never
      schema-locations: classpath:db/init.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: YTJhM2I0YzVkNmU3ZjhhOWIwYzFkMmUzZjQ1NjdhOGI5YzBkMWUyZjM0YTU=
  access-token-expiration: 1800000   # 30 分钟
  refresh-token-expiration: 604800000 # 7 天

# Knife4j 文档
springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    path: /v3/api-docs

# 业务配置
app:
  borrow:
    duration-days: 30      # 借阅期限（天）
    renew-days: 30         # 续借增加天数
    max-renew: 2           # 最大续借次数
    max-count: 5           # 用户最大借阅本数
  fine:
    daily-rate: 0.5        # 逾期日费率（元/天）
  reserve:
    expire-days: 7         # 预约等待有效期（天）
    pickup-days: 3         # 到书后保留天数
